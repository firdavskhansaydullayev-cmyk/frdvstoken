<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FRDVS Token</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD700;
    --gold2: #FFA500;
    --dark: #0a0a0f;
    --dark2: #12121a;
    --dark3: #1a1a28;
    --glow: rgba(255,215,0,0.4);
    --text: #e8e0c8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* Background stars */
  .stars {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 50%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(2px 2px at 40% 20%, rgba(255,215,0,0.3) 0%, transparent 100%),
      radial-gradient(2px 2px at 60% 90%, rgba(255,215,0,0.2) 0%, transparent 100%);
  }

  .container {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center;
    height: 100vh;
    padding: 16px;
    gap: 12px;
  }

  /* Header */
  .header {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    background: rgba(255,215,0,0.05);
    border: 1px solid rgba(255,215,0,0.15);
    border-radius: 16px;
    backdrop-filter: blur(10px);
  }

  .username {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 1px;
  }

  .level-badge {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: #000;
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
  }

  /* Score display */
  .score-section {
    text-align: center;
  }

  .score-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(255,215,0,0.5);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .score {
    font-family: 'Orbitron', monospace;
    font-size: 42px;
    font-weight: 900;
    background: linear-gradient(180deg, #fff 0%, var(--gold) 60%, var(--gold2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    filter: drop-shadow(0 0 20px var(--glow));
    transition: transform 0.05s ease;
  }

  .score.pulse {
    transform: scale(1.06);
  }

  .per-tap {
    font-size: 13px;
    color: rgba(255,215,0,0.6);
    margin-top: 2px;
  }

  /* Progress bar */
  .energy-section {
    width: 100%;
    padding: 0 4px;
  }

  .energy-header {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: rgba(255,215,0,0.5);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .energy-bar {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid rgba(255,215,0,0.1);
  }

  .energy-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold2), var(--gold), #fff8c0);
    border-radius: 10px;
    transition: width 0.3s ease;
    box-shadow: 0 0 10px var(--glow);
  }

  /* Main coin button */
  .coin-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .coin-outer {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, rgba(255,215,0,0.3), rgba(255,165,0,0.1), rgba(255,215,0,0.3));
    display: flex;
    align-items: center;
    justify-content: center;
    animation: rotate-ring 8s linear infinite;
    position: relative;
  }

  @keyframes rotate-ring {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .coin-btn {
    width: 190px;
    height: 190px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff5c0, #ffd700 40%, #b8860b 80%, #7a5800);
    border: none;
    cursor: pointer;
    position: relative;
    box-shadow:
      0 0 40px rgba(255,215,0,0.5),
      0 0 80px rgba(255,165,0,0.2),
      inset 0 2px 8px rgba(255,255,255,0.4),
      inset 0 -4px 12px rgba(0,0,0,0.4);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: coin-float 3s ease-in-out infinite;
    -webkit-appearance: none;
    touch-action: manipulation;
  }

  @keyframes coin-float {
    0%, 100% { transform: translateY(0px) rotate(-2deg); }
    50% { transform: translateY(-8px) rotate(2deg); }
  }

  .coin-btn:active {
    transform: scale(0.92) !important;
    box-shadow:
      0 0 20px rgba(255,215,0,0.8),
      0 0 40px rgba(255,165,0,0.4),
      inset 0 4px 16px rgba(0,0,0,0.5);
    animation: none;
  }

  .coin-symbol {
    font-family: 'Orbitron', monospace;
    font-size: 56px;
    font-weight: 900;
    color: rgba(0,0,0,0.5);
    text-shadow: 0 2px 4px rgba(255,255,255,0.3);
    pointer-events: none;
  }

  /* Floating +1 animation */
  .float-text {
    position: fixed;
    font-family: 'Orbitron', monospace;
    font-size: 24px;
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 10px var(--glow);
    pointer-events: none;
    z-index: 999;
    animation: float-up 1s ease-out forwards;
  }

  @keyframes float-up {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
  }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    width: 100%;
  }

  .stat-card {
    background: rgba(255,215,0,0.04);
    border: 1px solid rgba(255,215,0,0.12);
    border-radius: 12px;
    padding: 10px 8px;
    text-align: center;
  }

  .stat-value {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 700;
    color: var(--gold);
  }

  .stat-label {
    font-size: 9px;
    letter-spacing: 1.5px;
    color: rgba(255,215,0,0.4);
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Ripple effect */
  .ripple {
    position: fixed;
    border-radius: 50%;
    border: 2px solid rgba(255,215,0,0.6);
    pointer-events: none;
    z-index: 998;
    animation: ripple-out 0.6s ease-out forwards;
  }

  @keyframes ripple-out {
    0%   { width: 0; height: 0; opacity: 0.8; transform: translate(-50%, -50%); }
    100% { width: 120px; height: 120px; opacity: 0; transform: translate(-50%, -50%); }
  }

  /* Boost flash */
  .screen-flash {
    position: fixed; inset: 0; z-index: 997;
    background: radial-gradient(circle at center, rgba(255,215,0,0.15), transparent 70%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
  }

  .screen-flash.active { opacity: 1; }
</style>
</head>
<body>

<div class="stars"></div>
<div class="screen-flash" id="flash"></div>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="username" id="username">FRDVS USER</div>
    <div class="level-badge" id="levelBadge">LVL 1</div>
  </div>

  <!-- Score -->
  <div class="score-section">
    <div class="score-label">FRDVS TOKENS</div>
    <div class="score" id="score">0</div>
    <div class="per-tap">+<span id="tapPower">1</span> har bosishda</div>
  </div>

  <!-- Energy -->
  <div class="energy-section">
    <div class="energy-header">
      <span>⚡ ENERGIYA</span>
      <span><span id="energyVal">500</span> / 500</span>
    </div>
    <div class="energy-bar">
      <div class="energy-fill" id="energyFill" style="width:100%"></div>
    </div>
  </div>

  <!-- Coin -->
  <div class="coin-wrapper">
    <div class="coin-outer">
      <button class="coin-btn" id="coinBtn">
        <span class="coin-symbol">₿</span>
      </button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-value" id="totalTaps">0</div>
      <div class="stat-label">TAP</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="levelStat">1</div>
      <div class="stat-label">DARAJA</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="nextLevel">1000</div>
      <div class="stat-label">KEYINGI</div>
    </div>
  </div>
</div>

<script>
  // Telegram WebApp init
  if (window.Telegram && window.Telegram.WebApp) {
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
    const user = Telegram.WebApp.initDataUnsafe?.user;
    if (user) {
      const name = user.first_name || user.username || 'USER';
      document.getElementById('username').textContent = name.toUpperCase().slice(0, 12);
    }
  }

  // Game state (localStorage for persistence)
  let state = JSON.parse(localStorage.getItem('frdvs_state') || '{}');
  let score = state.score || 0;
  let totalTaps = state.totalTaps || 0;
  let energy = state.energy || 500;
  let level = state.level || 1;
  const maxEnergy = 500;
  const energyRegen = 1; // per second

  function tapPower() { return level; }

  function levelThreshold(lvl) { return lvl * 1000; }

  function updateUI() {
    document.getElementById('score').textContent = score.toLocaleString();
    document.getElementById('totalTaps').textContent = totalTaps.toLocaleString();
    document.getElementById('energyVal').textContent = Math.floor(energy);
    document.getElementById('levelStat').textContent = level;
    document.getElementById('levelBadge').textContent = 'LVL ' + level;
    document.getElementById('tapPower').textContent = tapPower();
    document.getElementById('nextLevel').textContent = (levelThreshold(level) - score > 0)
      ? (levelThreshold(level) - score).toLocaleString()
      : '✓';
    document.getElementById('energyFill').style.width = (energy / maxEnergy * 100) + '%';
  }

  function checkLevel() {
    while (score >= levelThreshold(level)) {
      level++;
      showLevelUp();
    }
  }

  function showLevelUp() {
    const el = document.createElement('div');
    el.className = 'float-text';
    el.style.left = '50%';
    el.style.top = '40%';
    el.style.transform = 'translateX(-50%)';
    el.style.fontSize = '20px';
    el.style.color = '#fff';
    el.textContent = '🎉 DARAJA ' + level + '!';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
    if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);
  }

  function saveState() {
    localStorage.setItem('frdvs_state', JSON.stringify({ score, totalTaps, energy, level }));
  }

  function spawnFloat(x, y, val) {
    const el = document.createElement('div');
    el.className = 'float-text';
    el.textContent = '+' + val;
    el.style.left = (x + (Math.random() * 30 - 15)) + 'px';
    el.style.top = (y - 20) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }

  function spawnRipple(x, y) {
    const el = document.createElement('div');
    el.className = 'ripple';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 600);
  }

  function flashScreen() {
    const f = document.getElementById('flash');
    f.classList.add('active');
    setTimeout(() => f.classList.remove('active'), 100);
  }

  // Tap handler
  const coinBtn = document.getElementById('coinBtn');

  function handleTap(e) {
    e.preventDefault();
    if (energy < 1) return;

    const touches = e.touches || [{ clientX: e.clientX, clientY: e.clientY }];
    const power = tapPower();

    for (let t of touches) {
      score += power;
      totalTaps++;
      energy = Math.max(0, energy - 1);
      spawnFloat(t.clientX, t.clientY, power);
      spawnRipple(t.clientX, t.clientY);
    }

    flashScreen();
    checkLevel();
    updateUI();
    saveState();

    // Score pulse
    const scoreEl = document.getElementById('score');
    scoreEl.classList.add('pulse');
    setTimeout(() => scoreEl.classList.remove('pulse'), 100);

    // Haptic
    if (navigator.vibrate) navigator.vibrate(15);
    if (window.Telegram?.WebApp?.HapticFeedback) {
      Telegram.WebApp.HapticFeedback.impactOccurred('light');
    }
  }

  coinBtn.addEventListener('touchstart', handleTap, { passive: false });
  coinBtn.addEventListener('click', handleTap);

  // Energy regen
  setInterval(() => {
    if (energy < maxEnergy) {
      energy = Math.min(maxEnergy, energy + energyRegen);
      updateUI();
    }
  }, 1000);

  // Auto-save every 5s
  setInterval(saveState, 5000);

  // Init
  updateUI();
</script>
</body>
</html>
